apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dora-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/saratrajan/dora-metrics
    targetRevision: feature/microservices
    path: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
