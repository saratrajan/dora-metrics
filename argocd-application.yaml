apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dora-metrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/YOUR_REPO   # replace with your GitOps repo
    targetRevision: HEAD
    path: dora-metrics                               # path to this folder in the repo
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
