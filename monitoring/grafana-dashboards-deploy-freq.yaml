apiVersion: v1
kind: ConfigMap
metadata:
  name: deploy-frequency-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  df-overview.json: |
    {
      "title": "Deploy Frequency — Overview",
      "uid": "dora-df-overview",
      "description": "Namespace health at a glance: DORA tier classification, deploy rate, success rate, tier distribution, and per-service stacked activity. TV slideshow screen 1 of 3.",
      "tags": ["dora", "deployment-frequency", "tv", "overview"],
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "version": 1,
      "graphTooltip": 0,
      "templating": {
        "list": [
          {
            "name": "environment",
            "label": "Environment",
            "type": "custom",
            "query": "lab,prod",
            "current": { "text": "lab", "value": "lab" },
            "options": [
              { "text": "lab",  "value": "lab",  "selected": true  },
              { "text": "prod", "value": "prod", "selected": false }
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(argocd_app_info{dest_namespace=~\".*$environment.*\"}, dest_namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*"
          }
        ]
      },

      "panels": [

        {
          "id": 1,
          "type": "row",
          "title": "Namespace Health",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },

        {
          "id": 2,
          "type": "stat",
          "title": "DORA Tier",
          "description": "Namespace aggregate classified against DORA thresholds. Elite ≥1/hr · High 0.14-1/hr · Medium 0.014-0.14/hr · Low <0.014/hr",
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "range", "options": { "from": 1,      "to": 1000000, "result": { "text": "Elite",  "index": 0 } } },
                { "type": "range", "options": { "from": 0.14,   "to": 0.9999,  "result": { "text": "High",   "index": 1 } } },
                { "type": "range", "options": { "from": 0.014,  "to": 0.1399,  "result": { "text": "Medium", "index": 2 } } },
                { "type": "range", "options": { "from": -0.001, "to": 0.0139,  "result": { "text": "Low",    "index": 3 } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.14 },
                  { "color": "green",  "value": 1    }
                ]
              },
              "noValue": "N/A"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "justifyMode": "center",
            "text": { "titleSize": 14, "valueSize": 52 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "Tier"
            }
          ]
        },

        {
          "id": 3,
          "type": "stat",
          "title": "Deploys / hr",
          "description": "Total successful syncs per hour across the selected namespace(s). Local 1h window.",
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.14 },
                  { "color": "green",  "value": 1    }
                ]
              },
              "noValue": "N/A"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": { "titleSize": 14, "valueSize": 40 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "deploys/hr"
            }
          ]
        },

        {
          "id": 4,
          "type": "stat",
          "title": "Active Services",
          "description": "Count of services with at least one deploy in the last 1h window.",
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": { "titleSize": 14, "valueSize": 40 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} > 0)",
              "legendFormat": "services"
            }
          ]
        },

        {
          "id": 5,
          "type": "stat",
          "title": "Elite Services",
          "description": "Services currently meeting DORA Elite threshold (≥1 deploy/hr in local testing).",
          "gridPos": { "x": 12, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 1    },
                  { "color": "green",  "value": 5    }
                ]
              },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": { "titleSize": 14, "valueSize": 40 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} >= 1) or vector(0)",
              "legendFormat": "elite"
            }
          ]
        },

        {
          "id": 6,
          "type": "stat",
          "title": "Deploy Success Rate",
          "description": "Succeeded syncs as a fraction of all sync attempts in the last 1h.",
          "gridPos": { "x": 16, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.85 },
                  { "color": "green",  "value": 0.95 }
                ]
              },
              "noValue": "N/A"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": { "titleSize": 14, "valueSize": 40 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(argocd_app_sync_total{phase=\"Succeeded\", dest_namespace=~\"$namespace\"}[1h])) / clamp_min(sum(increase(argocd_app_sync_total{dest_namespace=~\"$namespace\"}[1h])), 1)",
              "legendFormat": "success rate"
            }
          ]
        },

        {
          "id": 7,
          "type": "stat",
          "title": "Top Deployer",
          "description": "The single most active service (by deploys/hr) in the selected namespace.",
          "gridPos": { "x": 20, "y": 1, "w": 4, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 1,
              "color": { "mode": "fixed", "fixedColor": "green" },
              "noValue": "N/A"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value_and_name",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "text": { "titleSize": 14, "valueSize": 40 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(1, dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "{{name}}"
            }
          ]
        },

        {
          "id": 10,
          "type": "row",
          "title": "Deployment Activity",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 1 },
          "panels": []
        },

        {
          "id": 11,
          "type": "timeseries",
          "title": "Deploy Frequency by Service — Stacked (deploys/hr)",
          "description": "Every service as its own stacked layer. Taller = more total deploys across namespace. Spot which services dominate.",
          "gridPos": { "x": 0, "y": 9, "w": 16, "h": 12 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 65,
                "stacking": { "mode": "normal", "group": "A" },
                "thresholdsStyle": { "mode": "line" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "transparent", "value": null },
                  { "color": "yellow",      "value": 0.14 },
                  { "color": "green",       "value": 1    }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["lastNotNull", "max"]
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"}",
              "legendFormat": "{{name}}"
            }
          ]
        },

        {
          "id": 12,
          "type": "piechart",
          "title": "DORA Tier Distribution",
          "description": "How many services fall in each DORA deployment frequency tier. Elite ≥1/hr · High 0.14-1 · Medium 0.014-0.14 · Low <0.014",
          "gridPos": { "x": 16, "y": 9, "w": 8, "h": 12 },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Elite (≥1/hr)" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              },
              {
                "matcher": { "id": "byName", "options": "High (0.14-1/hr)" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "#5794f2" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Medium" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Low (<0.014/hr)" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              }
            ]
          },
          "options": {
            "pieType": "donut",
            "displayLabels": ["name", "value"],
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["value"] },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} >= 1) or vector(0)",
              "legendFormat": "Elite (≥1/hr)",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count((dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} >= 0.14) and (dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} < 1)) or vector(0)",
              "legendFormat": "High (0.14-1/hr)",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count((dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} >= 0.014) and (dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} < 0.14)) or vector(0)",
              "legendFormat": "Medium",
              "instant": true
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"} < 0.014) or vector(0)",
              "legendFormat": "Low (<0.014/hr)",
              "instant": true
            }
          ]
        }

      ]
    }

  df-rankings.json: |
    {
      "title": "Deploy Frequency — Service Rankings",
      "uid": "dora-df-rankings",
      "description": "Top and bottom deployers by namespace. Colour-coded by DORA tier. TV slideshow screen 2 of 3.",
      "tags": ["dora", "deployment-frequency", "tv", "rankings"],
      "time": { "from": "now-3h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "version": 1,
      "graphTooltip": 0,
      "templating": {
        "list": [
          {
            "name": "environment",
            "label": "Environment",
            "type": "custom",
            "query": "lab,prod",
            "current": { "text": "lab", "value": "lab" },
            "options": [
              { "text": "lab",  "value": "lab",  "selected": true  },
              { "text": "prod", "value": "prod", "selected": false }
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(argocd_app_info{dest_namespace=~\".*$environment.*\"}, dest_namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*"
          }
        ]
      },

      "panels": [

        {
          "id": 1,
          "type": "row",
          "title": "Service Rankings",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },

        {
          "id": 2,
          "type": "bargauge",
          "title": "Top 10 — Most Active Deployers (deploys/hr)",
          "description": "Highest-velocity services in the namespace. Colour follows DORA tier thresholds: green = Elite, yellow = High, red = Low.",
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 20 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.14 },
                  { "color": "green",  "value": 1    }
                ]
              },
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10,
            "text": { "titleSize": 14, "valueSize": 18 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "topk(10, dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "{{name}}",
              "instant": true
            }
          ]
        },

        {
          "id": 3,
          "type": "bargauge",
          "title": "Bottom 10 — Services with Lowest Deploy Activity (deploys/hr)",
          "description": "Services with the fewest deploys in the current window. Informational only — useful for spotting stale pipelines.",
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 20 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 0.14 },
                  { "color": "green",  "value": 1    }
                ]
              },
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "valueMode": "color",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10,
            "text": { "titleSize": 14, "valueSize": 18 }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "bottomk(10, dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "{{name}}",
              "instant": true
            }
          ]
        }

      ]
    }

  df-trends.json: |
    {
      "title": "Deploy Frequency — Trends & Services",
      "uid": "dora-df-trends",
      "description": "Deploy cadence over time, cumulative counts, full service inventory, and per-service drill-down. TV slideshow screen 3 of 3.",
      "tags": ["dora", "deployment-frequency", "tv", "trends"],
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "version": 1,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "environment",
            "label": "Environment",
            "type": "custom",
            "query": "lab,prod",
            "current": { "text": "lab", "value": "lab" },
            "options": [
              { "text": "lab",  "value": "lab",  "selected": true  },
              { "text": "prod", "value": "prod", "selected": false }
            ],
            "includeAll": false,
            "multi": false
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(argocd_app_info{dest_namespace=~\".*$environment.*\"}, dest_namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "multi": true,
            "allValue": ".*"
          },
          {
            "name": "app",
            "label": "Service (drill-down)",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"}, name)",
            "refresh": 2,
            "sort": 1,
            "includeAll": false,
            "multi": false
          }
        ]
      },

      "panels": [

        {
          "id": 1,
          "type": "row",
          "title": "Trend & Cadence",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },

        {
          "id": 2,
          "type": "timeseries",
          "title": "Namespace Aggregate — With DORA Bands",
          "description": "Total deploys/hr across the namespace. Green band = Elite zone (≥1/hr), yellow = High, red = Low. Rolling average overlay shows the sustained trend.",
          "gridPos": { "x": 0, "y": 1, "w": 12, "h": 10 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "thresholdsStyle": { "mode": "area" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "rgba(242,73,92,0.15)",   "value": null },
                  { "color": "rgba(255,152,48,0.15)",  "value": 0.14 },
                  { "color": "rgba(115,191,105,0.15)", "value": 1    }
                ]
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "/rolling avg/" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "dash": [8, 4], "fill": "dash" } },
                  { "id": "custom.lineWidth", "value": 1 },
                  { "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})",
              "legendFormat": "total deploys/hr"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "avg_over_time(sum(dora:deployment_frequency:daily{dest_namespace=~\"$namespace\"})[1h:15s])",
              "legendFormat": "1h rolling avg"
            }
          ]
        },

        {
          "id": 3,
          "type": "timeseries",
          "title": "Live Burst Rate — 15m Sliding Window (deploys/hr)",
          "description": "Raw counter rate over 15-minute windows, scaled to deploys/hr. Shows burst activity and sudden spikes not visible in the 1h recording rule.",
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 10 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 2,
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 40,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": {
              "displayMode": "table",
              "placement": "right",
              "calcs": ["max", "mean"]
            }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (name)(rate(argocd_app_sync_total{phase=\"Succeeded\", dest_namespace=~\"$namespace\"}[15m])) * 3600",
              "legendFormat": "{{name}}"
            }
          ]
        },

        {
          "id": 4,
          "type": "timeseries",
          "title": "Cumulative Deploy Count — Over Selected Window",
          "description": "Running total of successful syncs within the dashboard time window. A steeper slope = higher deploy velocity at that moment.",
          "gridPos": { "x": 0, "y": 11, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20
              }
            },
