<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Segoe UI', system-ui, sans-serif">
  <title>DORA Metrics Data Flow</title>
  <desc>Architecture diagram showing how ArgoCD metrics flow through Prometheus recording rules to a Grafana dashboard displaying DORA metrics.</desc>

  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">DORA Metrics — Observability Pipeline</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-size="11">ArgoCD  →  Prometheus  →  Grafana</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAYER 1: ArgoCD Controllers -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="80" width="230" height="330" rx="12" fill="#0d1f35" stroke="#1e40af" stroke-width="1.5"/>
  <text x="145" y="103" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="1">ARGOCD</text>
  <text x="145" y="118" text-anchor="middle" fill="#475569" font-size="9.5">kind-travel-lab cluster</text>

  <!-- App Controller -->
  <rect x="50" y="128" width="190" height="72" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="148" fill="#93c5fd" font-size="10" font-weight="600">⚙  Application Controller</text>
  <text x="60" y="165" fill="#64748b" font-size="8.5">argocd_app_sync_total</text>
  <text x="60" y="178" fill="#64748b" font-size="8.5">argocd_app_info</text>
  <text x="60" y="191" fill="#334155" font-size="8">:8082/metrics</text>

  <!-- Repo Server -->
  <rect x="50" y="212" width="190" height="72" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="232" fill="#93c5fd" font-size="10" font-weight="600">📦  Repo Server</text>
  <text x="60" y="249" fill="#64748b" font-size="8.5">argocd_app_reconcile_bucket</text>
  <text x="60" y="262" fill="#64748b" font-size="8.5">argocd_git_fetch_duration</text>
  <text x="60" y="275" fill="#334155" font-size="8">:8084/metrics</text>

  <!-- API Server -->
  <rect x="50" y="296" width="190" height="72" rx="8" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
  <text x="60" y="316" fill="#93c5fd" font-size="10" font-weight="600">🌐  API Server</text>
  <text x="60" y="333" fill="#64748b" font-size="8.5">grpc_server_handled_total</text>
  <text x="60" y="346" fill="#64748b" font-size="8.5">argocd_redis_request_total</text>
  <text x="60" y="359" fill="#334155" font-size="8">:8083/metrics</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAYER 2: ServiceMonitor + scrape arrow -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="260" y1="250" x2="315" y2="250" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="315,246 323,250 315,254" fill="#1d4ed8"/>
  <text x="288" y="242" text-anchor="middle" fill="#475569" font-size="8">scrape</text>

  <rect x="323" y="226" width="114" height="48" rx="8" fill="#172033" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="380" y="247" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">ServiceMonitor</text>
  <text x="380" y="261" text-anchor="middle" fill="#475569" font-size="8">argocd namespace</text>
  <text x="380" y="272" text-anchor="middle" fill="#334155" font-size="7.5">30s interval</text>

  <line x1="437" y1="250" x2="490" y2="250" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="490,246 498,250 490,254" fill="#1d4ed8"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAYER 3: Prometheus -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="498" y="80" width="210" height="330" rx="12" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="603" y="103" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700" letter-spacing="1">PROMETHEUS</text>
  <text x="603" y="118" text-anchor="middle" fill="#475569" font-size="9.5">kube-prometheus-stack</text>

  <rect x="516" y="128" width="174" height="55" rx="8" fill="#2d1b5e" stroke="#7c3aed" stroke-width="1"/>
  <text x="603" y="149" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">🗄  TSDB</text>
  <text x="603" y="165" text-anchor="middle" fill="#64748b" font-size="8.5">Raw metric store</text>
  <text x="603" y="177" text-anchor="middle" fill="#334155" font-size="7.5">15-day retention</text>

  <rect x="516" y="196" width="174" height="140" rx="8" fill="#2d1b5e" stroke="#7c3aed" stroke-width="1"/>
  <text x="603" y="216" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">📐  PrometheusRule</text>
  <text x="603" y="230" text-anchor="middle" fill="#475569" font-size="8">dora-metrics   1m eval</text>

  <rect x="524" y="237" width="158" height="22" rx="4" fill="#1a0a2e"/>
  <text x="533" y="252" fill="#6ee7b7" font-size="8">dora:deployment_frequency:daily</text>

  <rect x="524" y="264" width="158" height="22" rx="4" fill="#1a0a2e"/>
  <text x="533" y="279" fill="#fbbf24" font-size="8">dora:change_failure_rate:7d</text>

  <rect x="524" y="291" width="158" height="22" rx="4" fill="#1a0a2e"/>
  <text x="533" y="306" fill="#f87171" font-size="8">dora:lead_time_p95:1h</text>

  <rect x="524" y="318" width="158" height="22" rx="4" fill="#1a0a2e"/>
  <text x="533" y="333" fill="#a78bfa" font-size="8">dora:mttr_proxy:1h</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Arrow Prometheus → Grafana -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="708" y1="250" x2="752" y2="250" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="752,246 760,250 752,254" fill="#7c3aed"/>
  <text x="733" y="242" text-anchor="middle" fill="#475569" font-size="8">PromQL</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- LAYER 4: Grafana -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="760" y="80" width="116" height="330" rx="12" fill="#0f2318" stroke="#16a34a" stroke-width="1.5"/>
  <text x="818" y="103" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700" letter-spacing="1">GRAFANA</text>
  <text x="818" y="118" text-anchor="middle" fill="#475569" font-size="9.5">port 3000</text>

  <rect x="773" y="128" width="90" height="40" rx="6" fill="#14532d" stroke="#16a34a" stroke-width="0.8"/>
  <text x="818" y="145" text-anchor="middle" fill="#6ee7b7" font-size="8.5" font-weight="600">Deploy Freq</text>
  <text x="818" y="159" text-anchor="middle" fill="#475569" font-size="7.5">timeseries</text>

  <rect x="773" y="178" width="90" height="40" rx="6" fill="#78350f" stroke="#d97706" stroke-width="0.8"/>
  <text x="818" y="195" text-anchor="middle" fill="#fde68a" font-size="8.5" font-weight="600">Failure Rate</text>
  <text x="818" y="209" text-anchor="middle" fill="#475569" font-size="7.5">timeseries</text>

  <rect x="773" y="228" width="90" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="818" y="245" text-anchor="middle" fill="#93c5fd" font-size="8.5" font-weight="600">Lead Time</text>
  <text x="818" y="259" text-anchor="middle" fill="#475569" font-size="7.5">stat / series</text>

  <rect x="773" y="278" width="90" height="40" rx="6" fill="#2d1b5e" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="818" y="295" text-anchor="middle" fill="#c4b5fd" font-size="8.5" font-weight="600">App Health</text>
  <text x="818" y="309" text-anchor="middle" fill="#475569" font-size="7.5">pie / stat</text>

  <rect x="773" y="328" width="90" height="40" rx="6" fill="#172033" stroke="#475569" stroke-width="0.8"/>
  <text x="818" y="345" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-weight="600">All Services</text>
  <text x="818" y="359" text-anchor="middle" fill="#475569" font-size="7.5">table</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- GitHub GitOps -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="360" y="450" width="180" height="54" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="450" y="472" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="600">⬡  GitHub (main branch)</text>
  <text x="450" y="489" text-anchor="middle" fill="#475569" font-size="8.5">dora-metrics repo</text>
  <text x="450" y="501" text-anchor="middle" fill="#334155" font-size="7.5">manifests · charts · prometheusrule</text>

  <line x1="360" y1="477" x2="190" y2="420" stroke="#30363d" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="188,426 184,417 194,418" fill="#30363d"/>
  <text x="255" y="461" text-anchor="middle" fill="#334155" font-size="8" transform="rotate(-22,255,461)">GitOps pull</text>

  <line x1="540" y1="477" x2="590" y2="420" stroke="#30363d" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="594,426 598,417 588,418" fill="#30363d"/>
  <text x="575" y="462" text-anchor="middle" fill="#334155" font-size="8" transform="rotate(22,575,462)">GitOps pull</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="450" width="295" height="90" rx="8" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
  <text x="45" y="471" fill="#64748b" font-size="9.5" font-weight="600">DATA FLOW</text>

  <line x1="45" y1="485" x2="75" y2="485" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="75,481 83,485 75,489" fill="#1d4ed8"/>
  <text x="90" y="489" fill="#94a3b8" font-size="9">Prometheus scrape (pull model, 30s)</text>

  <line x1="45" y1="505" x2="75" y2="505" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="75,501 83,505 75,509" fill="#7c3aed"/>
  <text x="90" y="509" fill="#94a3b8" font-size="9">PromQL query (on-demand)</text>

  <line x1="45" y1="525" x2="75" y2="525" stroke="#30363d" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="73,521 81,525 73,529" fill="#30363d"/>
  <text x="90" y="529" fill="#94a3b8" font-size="9">GitOps sync (ArgoCD watches repo)</text>

  <!-- DORA tier badge -->
  <rect x="620" y="450" width="250" height="90" rx="8" fill="#0d1117" stroke="#1e293b" stroke-width="1"/>
  <text x="635" y="471" fill="#64748b" font-size="9.5" font-weight="600">DORA METRICS</text>
  <rect x="635" y="479" width="8" height="8" rx="2" fill="#6ee7b7"/>
  <text x="650" y="488" fill="#94a3b8" font-size="9">Deployment Frequency  (24h syncs)</text>
  <rect x="635" y="497" width="8" height="8" rx="2" fill="#fbbf24"/>
  <text x="650" y="506" fill="#94a3b8" font-size="9">Change Failure Rate  (7d window)</text>
  <rect x="635" y="515" width="8" height="8" rx="2" fill="#f87171"/>
  <text x="650" y="524" fill="#94a3b8" font-size="9">Lead Time P95  (reconcile proxy)</text>
  <rect x="635" y="533" width="8" height="8" rx="2" fill="#a78bfa"/>
  <text x="650" y="542" fill="#94a3b8" font-size="9">MTTR Proxy  (unhealthy duration)</text>

  <!-- Separator lines -->
  <line x1="260" y1="88" x2="260" y2="402" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="498" y1="88" x2="498" y2="402" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="760" y1="88" x2="760" y2="402" stroke="#1e293b" stroke-width="0.5"/>

  <!-- Layer labels -->
  <text x="145" y="418" text-anchor="middle" fill="#1d4ed8" font-size="8.5" font-weight="600">① SOURCE</text>
  <text x="380" y="418" text-anchor="middle" fill="#1d4ed8" font-size="8.5" font-weight="600">② COLLECT</text>
  <text x="603" y="418" text-anchor="middle" fill="#7c3aed" font-size="8.5" font-weight="600">③ COMPUTE</text>
  <text x="818" y="418" text-anchor="middle" fill="#16a34a" font-size="8.5" font-weight="600">④ VISUALISE</text>
</svg>
