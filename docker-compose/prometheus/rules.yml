groups:
  - name: dora.rules
    interval: 15s
    rules:

      # Deployment Frequency — successful syncs in last 1h
      # NOTE: local-only rule. No *24 extrapolation — counters are only minutes old
      # so scaling to /day produces garbage. Shows honest deploys/hr instead.
      # Production rule (prometheusrule.yaml) uses [24h] window with no scaling.
      - record: dora:deployment_frequency:daily
        expr: |
          sum by (name, project, dest_namespace) (
            increase(argocd_app_sync_total{phase="Succeeded"}[1h])
          )

      # Change Failure Rate — failed / total syncs over last 1h
      - record: dora:change_failure_rate:7d
        expr: |
          sum by (name, project, dest_namespace) (
            increase(argocd_app_sync_total{phase="Failed"}[1h])
          )
          /
          clamp_min(
            sum by (name, project, dest_namespace) (
              increase(argocd_app_sync_total[1h])
            ),
            1
          )

      # Lead Time Proxy — reconcile P95 over last 1h, joined with app_info to get dest_namespace
      - record: dora:lead_time_p95:1h
        expr: |
          histogram_quantile(
            0.95,
            sum by (name, dest_namespace, le) (
              rate(argocd_app_reconcile_bucket[1h])
              * on(name, namespace) group_left(dest_namespace)
                max by (name, namespace, dest_namespace) (argocd_app_info)
            )
          )
